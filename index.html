        .mode-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .mode-card { padding: 30px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.3s; }
        .mode-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2); }
        .mode-card.selected { border-color: #667eea; background: #f0f4ff; }
        .mode-card h2 { font-size: 20px; margin-bottom: 10px; color: #667eea; }
        .mode-card p { font-size: 14px; color: #666; }

        .section { display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section h2 { font-size: 22px; margin-bottom: 20px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .section h3 { font-size: 16px; margin: 20px 0 10px 0; color: #555; }

        label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; }

        .checkbox-group, .radio-group { display: grid; gap: 12px; }
        .checkbox-item, .radio-item { display: flex; align-items: center; }
        input[type="checkbox"], input[type="radio"] { margin-right: 8px; cursor: pointer; }
        .checkbox-item label, .radio-item label { margin: 0; display: flex; align-items: center; cursor: pointer; font-weight: normal; }

        /* Question Section */
        .question-page { background: white; padding: 30px; border-radius: 8px; }
        .question-item { margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid #eee; }
        .question-item:last-child { border-bottom: none; }
        .question-text { font-weight: 600; margin-bottom: 15px; color: #333; }
        .question-num { color: #667eea; font-weight: bold; }

        /* SVG Question Styles */
        .svg-container { margin: 20px 0; padding: 20px; background: #f9f9f9; border-radius: 6px; display: flex; justify-content: center; }
        svg { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 6px; }

        .button-group { display: flex; gap: 15px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 30px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(102, 126, 234, 0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-outline { background: white; border: 2px solid #667eea; color: #667eea; }
        .btn-outline:hover { background: #f0f4ff; }

        /* Results */
        .results-container { background: white; padding: 30px; border-radius: 8px; }
        .result-header { text-align: center; margin-bottom: 30px; }
        .result-header h2 { font-size: 28px; color: #667eea; margin-bottom: 10px; }
        .result-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .result-table th, .result-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }

        .comment-section h3 { margin-top: 0; color: #667eea; }
        .comment-text { line-height: 1.6; color: #555; }

        .email-section { background: #f0f4ff; padding: 20px; border-radius: 6px; margin: 20px 0; border: 2px dashed #667eea; }
        .email-section h3 { color: #667eea; margin-top: 0; }

        /* Validation */
        .error-message { color: #e74c3c; font-size: 13px; margin-top: 5px; }
        .required::after { content: " *"; color: #e74c3c; }

        /* Responsive */

            .header h1 { font-size: 22px; }

let appState = {
    currentLanguage: 'ja',
    currentMode: null,
    currentSection: 'mode',
    part2Page: 0,
    part2PageSize: 5,
    testData: {},
    results: null,
    testId: generateTestId()

// ==================== UTILITY FUNCTIONS ====================
function generateTestId() {
    return 'YB' + Date.now();
}

function t(key) {
    const keys = key.split('.');
    let value = translations[appState.currentLanguage];
    for (const k of keys) {
        if (value && typeof value === 'object') {
            value = value[k];
        }
    }
    return value || key;
}

function tJa(key) {
    const keys = key.split('.');
    let value = translations['ja'];
    for (const k of keys) {
        if (value && typeof value === 'object') {
            value = value[k];
        }
    }
    return value || key;
}

function tBi(key) {
    if (appState.currentLanguage === 'ja') {
        return t(key);
    }
    var local = t(key);
    var ja = tJa(key);
    if (local === ja || !ja) return local;
    return local + '<span class="ja-sub">' + ja + '</span>';
}

function tBiText(key) {
    if (appState.currentLanguage === 'ja') {
        return t(key);
    }
    var local = t(key);
    var ja = tJa(key);
    if (local === ja || !ja) return local;
    return local + '（' + ja + '）';
}

function updateLanguage(lang) {
    appState.currentLanguage = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    renderAllText();
    if (appState.currentSection === 'part1') {
        renderPart1Form();
    } else if (appState.currentSection === 'part2') {
        renderPart2Page();
    }
}

function renderAllText() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        if (el.tagName === 'BUTTON' || el.tagName === 'OPTION') {
            el.textContent = t(el.dataset.i18n);
        } else {
            el.innerHTML = tBi(el.dataset.i18n);
        }
    });
}

function updateProgress(percent) {
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('progressText').textContent = percent + '%';
}

function showSection(sectionId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const section = document.getElementById(sectionId);
    if (section) section.classList.add('active');
}

// ==================== PART 1 FORM RENDERING ====================
function renderPart1Form() {
    const container = document.getElementById('part1Content');
    container.innerHTML = '';

    const isDomestic = appState.currentMode === 'domestic';
    const fields = isDomestic ? getDomesticFields() : getOverseasFields();

    fields.forEach(field => {
        const group = document.createElement('div');
        group.className = 'form-group';

        const label = document.createElement('label');
        label.innerHTML = (field.required ? '<span class="required">' : '') + tBi(field.label) + (field.required ? '</span>' : '');
        group.appendChild(label);

        let input;
        switch (field.type) {
            case 'text':
            case 'number':
                input = document.createElement('input');
                input.type = field.type;
                input.id = field.id;
                input.placeholder = field.placeholder || '';
                break;
            case 'select':
                input = document.createElement('select');
                input.id = field.id;
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = '---';
                input.appendChild(defaultOpt);
                field.options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt.value;
                    option.textContent = tBiText(opt.label);
                    input.appendChild(option);
                });
                break;
            case 'checkbox':
                const checkboxGroup = document.createElement('div');
                checkboxGroup.className = 'checkbox-group';
                field.options.forEach(opt => {
                    const item = document.createElement('div');
                    item.className = 'checkbox-item';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.id = field.id + '_' + opt.value;
                    cb.value = opt.value;
                    cb.name = field.id;
                    const lbl = document.createElement('label');
                    lbl.htmlFor = cb.id;
                    lbl.innerHTML = tBi(opt.label);
                    item.appendChild(cb);
                    item.appendChild(lbl);
                    checkboxGroup.appendChild(item);
                });
                input = checkboxGroup;
                break;
            case 'textarea':
                input = document.createElement('textarea');
                input.id = field.id;
                break;
        }

        if (input) group.appendChild(input);
        container.appendChild(group);
    });
}

function renderPart2Page() {
    const container = document.getElementById('part2Content');
    container.innerHTML = '';

    const allQuestions = getPart2Questions();
    const startIdx = appState.part2Page * appState.part2PageSize;
    const endIdx = Math.min(startIdx + appState.part2PageSize, allQuestions.length);
    const questions = allQuestions.slice(startIdx, endIdx);

    questions.forEach((q, index) => {
        const item = document.createElement('div');
        item.className = 'question-item';
        item.setAttribute('data-qid', q.id);

        const textDiv = document.createElement('div');
        textDiv.className = 'question-text';
        textDiv.innerHTML = '<span class="question-num">Q' + (startIdx + index + 1) + ':</span> ' + tBi(q.text);
        item.appendChild(textDiv);

        if (q.type === 'svg' && q.svg) {
            const svgDiv = document.createElement('div');
            svgDiv.className = 'svg-container';
            svgDiv.innerHTML = q.svg;
            item.appendChild(svgDiv);
        }

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'radio-group';
        q.options.forEach(opt => {
            const optItem = document.createElement('div');
            optItem.className = 'radio-item';
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = q.id;
            radio.value = opt.value;
            radio.id = q.id + '_' + opt.value;
            radio.addEventListener('change', function() {
                const card = this.closest('[data-qid]');
                if (card) { card.style.border = ''; card.style.borderRadius = ''; }
            });
            const label = document.createElement('label');
            label.htmlFor = radio.id;
            label.innerHTML = tBi(opt.label);
            optItem.appendChild(radio);
            optItem.appendChild(label);
            optionsDiv.appendChild(optItem);
        });
        item.appendChild(optionsDiv);

        container.appendChild(item);
    });

    const pageNum = appState.part2Page + 1;
    const totalPages = Math.ceil(allQuestions.length / appState.part2PageSize);
    updateProgress(Math.round(75 + (pageNum / totalPages) * 25));
}

// ==================== SCORING & RESULTS ====================
function calculateScores() {
    const answers = appState.testData;

    const scoreMap = {
        interest: [1, 2, 3, 4, 5],
        learning: [3, 6, 7, 9],
        adaptation: [10, 11, 12, 13, 14],
        communication: [8, 15, 16, 17, 18, 19, 20],
        careWork: [21, 22, 23, 24, 29, 30],
        autonomy: [25, 26, 27, 28, 31, 32]
    };

    const traits = {};
    for (const [trait, questionNums] of Object.entries(scoreMap)) {
        let total = 0;
        let count = 0;
        questionNums.forEach(qNum => {
            const answer = answers['q' + qNum];
            if (answer !== undefined && answer !== null && answer !== '') {
                const score = scoreQuestion(qNum, answer);
                total += score;
                count++;
            }
        });
        traits[trait] = count > 0 ? (total / count) : 0;
    }

    return traits;
}

function scoreQuestion(qNum, answer) {
    const isDomestic = appState.currentMode === 'domestic';

    // Special reverse scoring
    if (qNum === 5) {
        return answer == 1 ? 5 : 1;
    }
    if (qNum === 27) {
        return answer == 1 ? 5 : 1;
    }
    if (qNum === 28) {
        return answer == 2 ? 5 : 1;
    }

    // For 5-option question Q11
    if (qNum === 11) {
        const scores = { 1: 5, 2: 4, 3: 3, 4: 2, 5: 1 };
        return scores[answer] || 0;
    }

    // For 3-option questions Q1-Q5 (except Q5)
    if ([1, 2, 3, 4].includes(qNum)) {
        if (qNum === 2 && !isDomestic) {
            return [0, 1, 3, 5][answer] || 0;
        }
        if (qNum === 3 && !isDomestic) {
            return [0, 1, 3, 5][answer] || 0;
        }
        const scores = { 1: 1, 2: 3, 3: 5 };
        return scores[answer] || 0;
    }

    if (qNum === 4) {
        const scores = { 1: 1, 2: 3, 3: 5 };
        return scores[answer] || 0;
    }

    // Binary yes/no questions
    if ([6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 24, 25, 26, 29, 30].includes(qNum)) {
        return answer == 1 ? 5 : 1;
    }

    // Q20
    if (qNum === 20) {
        return answer == 1 ? 5 : 1;
    }

    // Q31, Q32
    if ([31, 32].includes(qNum)) {
        if ([1, 2].includes(parseInt(answer))) return 5;
        return 1;
    }

    return 0;
}

function generateComment(traits) {
    // Simple version for display (backward compat)
    return generateDetailedComments().join('\n\n');
}

function generateDetailedComments() {
    const a = appState.testData;
    const isDomestic = appState.currentMode === 'domestic';
    const comments = [];

    // 日本への関心
    if (a.q1 == 3) comments.push('cm1');
    if (isDomestic) {
        if (a.q2 == 2 || a.q2 == 3) comments.push('cm2');
    } else {
        if (a.q2 == 3) comments.push('cm3');
    }

    // 学習・継続
    if (a.q6 == 1 || a.q11 == 1 || a.q11 == 2) {
        comments.push('cm4');
    }

    // 異文化適応
    if (a.q10 == 1) {
        comments.push('cm5');
    }

    // コミュニケーション
    const likeTalking = a.q8 == 1;
    const betterListener = a.q19 == 1;
    if (likeTalking && betterListener) {
        comments.push('cm6');
    } else if (likeTalking) {
        comments.push('cm7');
    } else if (betterListener) {
        comments.push('cm8');
    }

    // 観察力 Q31-Q32
    const q31 = parseInt(a.q31);
    const q32 = parseInt(a.q32);
    if ((q31 === 1 || q31 === 2) && (q32 === 1 || q32 === 2)) {
        comments.push('cm9');
    } else if (q31 === 3 || q32 === 3) {
        comments.push('cm10');
    }

    if (comments.length < 2) {
        comments.push('cm11');
    }

    return comments;
}

// Build SVG radar chart for email/PDF (no canvas needed)
function buildRadarSVG(scores, color, size) {
    var labels = ['関心', '学習', '適応', 'コミュ', '介護', '自律'];
    var n = 6;
    var w = size, h = size;
    var cx = w/2, cy = h/2, r = Math.min(w,h) * 0.28;
    var s = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="display:block;">';
    s += '<rect width="'+w+'" height="'+h+'" fill="white" rx="8"/>';
    // Grid pentagons
    for (var ring = 1; ring <= 5; ring++) {
        var pts = [];
        for (var j = 0; j < n; j++) {
            var a = -Math.PI/2 + (2*Math.PI*j/n);
            pts.push((cx + r*ring/5*Math.cos(a)).toFixed(1)+','+(cy + r*ring/5*Math.sin(a)).toFixed(1));
        }
        s += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="#d1d5db" stroke-width="0.7"/>';
        // Scale numbers on top axis
        var sy = cy - r*ring/5;
        s += '<text x="'+(cx+4)+'" y="'+(sy-2)+'" font-size="9" fill="#aaa" font-family="sans-serif">'+ring+'</text>';
    }
    // Axis lines
    for (var i = 0; i < n; i++) {
        var a = -Math.PI/2 + (2*Math.PI*i/n);
        s += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#d1d5db" stroke-width="0.7"/>';
    }
    // Data polygon
    var dp = [];
    for (var i = 0; i < n; i++) {
        var a = -Math.PI/2 + (2*Math.PI*i/n);
        var v = Math.min(scores[i],5)/5;
        dp.push((cx+r*v*Math.cos(a)).toFixed(1)+','+(cy+r*v*Math.sin(a)).toFixed(1));
    }
    s += '<polygon points="'+dp.join(' ')+'" fill="'+color+'" fill-opacity="0.18" stroke="'+color+'" stroke-width="2.5"/>';
    // Data points
    for (var i = 0; i < n; i++) {
        var a = -Math.PI/2 + (2*Math.PI*i/n);
        var v = Math.min(scores[i],5)/5;
        var px = cx+r*v*Math.cos(a), py = cy+r*v*Math.sin(a);
        s += '<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="4" fill="'+color+'" stroke="white" stroke-width="1.5"/>';
    }
    // Labels + scores
    for (var i = 0; i < n; i++) {
        var a = -Math.PI/2 + (2*Math.PI*i/n);
        var ld = r + 22;
        var lx = cx + ld*Math.cos(a), ly = cy + ld*Math.sin(a);
        var anc = 'middle';
        if (Math.cos(a) > 0.3) anc = 'start';
        else if (Math.cos(a) < -0.3) anc = 'end';
        s += '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="'+anc+'" dominant-baseline="middle" font-size="13" font-family="sans-serif" fill="#374151" font-weight="bold">'+labels[i]+'</text>';
        var sx = lx, sy2 = ly + 15;
        if (i === 0) { sx = lx; sy2 = ly - 15; } // top label: score above
        s += '<text x="'+sx.toFixed(1)+'" y="'+sy2.toFixed(1)+'" text-anchor="'+anc+'" dominant-baseline="middle" font-size="12" font-family="sans-serif" fill="'+color+'" font-weight="bold">'+scores[i].toFixed(1)+'</text>';
    }
    s += '</svg>';
    return s;
}

function matchPattern(traits) {
    const userScores = [traits.interest, traits.learning, traits.adaptation, traits.communication, traits.careWork, traits.autonomy];

    let bestMatch = 'A';
    let bestDist = Infinity;
    const distances = {};

    ['A', 'B', 'C'].forEach(function(key) {
        let dist = 0;
        for (let i = 0; i < 6; i++) {
            dist += Math.pow(userScores[i] - PATTERNS[key].means[i], 2);
        }
        dist = Math.sqrt(dist);
        distances[key] = dist;
        if (dist < bestDist) {
            bestDist = dist;
            bestMatch = key;
        }
    });

    // Calculate similarity percentages (max distance ~12.25 for 6 dims, 0-5 range)
    const maxDist = Math.sqrt(6 * 25);
    const similarities = {};
    ['A', 'B', 'C'].forEach(function(key) {
        similarities[key] = Math.max(0, Math.round((1 - distances[key] / maxDist) * 100));
    });

    return { type: bestMatch, distance: bestDist, distances: distances, similarities: similarities, pattern: PATTERNS[bestMatch] };
}

function generatePersonalityAnalysis(traits) {
    const userScores = [traits.interest, traits.learning, traits.adaptation, traits.communication, traits.careWork, traits.autonomy];

    // Find top 2 strengths and weakest
    var indexed = userScores.map(function(v, i) { return {val: v, idx: i}; });
    indexed.sort(function(a, b) { return b.val - a.val; });

    var strengths = indexed.slice(0, 2);
    var weakest = indexed[indexed.length - 1];

    var analysis = [];

    // Strength description
    analysis.push('あなたの最も高い特性は「' + TRAIT_NAMES_FULL[strengths[0].idx] + '（' + strengths[0].val.toFixed(1) + '）」と「' + TRAIT_NAMES_FULL[strengths[1].idx] + '（' + strengths[1].val.toFixed(1) + '）」です。');

    // Personality tendency based on score combinations
    if (traits.communication >= 4.0 && traits.adaptation >= 4.0) {
        analysis.push('社交的で柔軟性が高く、異文化環境でも円滑な人間関係を築ける傾向があります。');
    } else if (traits.communication >= 4.0) {
        analysis.push('人との関わりを大切にし、コミュニケーションに積極的な傾向があります。');
    } else if (traits.adaptation >= 4.0) {
        analysis.push('新しい環境への適応力が高く、変化に柔軟に対応できる傾向があります。');
    }

    if (traits.interest >= 4.0 && traits.learning >= 4.0) {
        analysis.push('日本への強い関心と高い学習意欲を持ち、日本での生活・就労に対するモチベーションが非常に高いです。');
    } else if (traits.interest >= 4.0) {
        analysis.push('日本の文化や生活に対する関心が高く、日本での就労への意欲が感じられます。');
    } else if (traits.learning >= 4.0) {
        analysis.push('学習能力が高く、新しい知識やスキルの習得に積極的です。');
    }

    if (traits.careWork >= 4.0 && traits.autonomy >= 4.0) {
        analysis.push('介護職への適応力と自律的判断力の両方が高く、即戦力としての素質があります。');
    } else if (traits.careWork >= 4.0) {
        analysis.push('介護の仕事に必要な資質を持ち、現場での活躍が期待できます。');
    } else if (traits.autonomy >= 4.0) {
        analysis.push('主体的に考え行動できる力があり、自ら課題を見つけて取り組む姿勢があります。');
    }

    // Weakness analysis (弱み) - always analyze relative weakness
    analysis.push('');
    analysis.push('【弱み・克服すべき点】');

    // Always report the weakest trait (relative weakness)
    var weak1 = indexed[indexed.length - 1];
    var weak2 = indexed[indexed.length - 2];

    // Weakness descriptions per trait
    var weakDesc = {};
    weakDesc[0] = '日本への関心がやや低めです。日本の文化・生活への理解を深め、就労モチベーションをさらに高めることが大切です。';
    weakDesc[1] = '日本語学習適性が相対的に低い傾向です。継続的な学習習慣を身につけ、日本語力の向上に積極的に取り組みましょう。';
    weakDesc[2] = '異文化適応力がやや弱めです。日本の習慣やルールを積極的に学び、柔軟に対応する力を養いましょう。';
    weakDesc[3] = 'コミュニケーション能力に伸びしろがあります。日常会話の練習や、周囲と積極的に関わる姿勢を身につけましょう。';
    weakDesc[4] = '介護職適応力をさらに伸ばす余地があります。介護の基本知識や利用者への接し方を事前に学ぶことをお勧めします。';
    weakDesc[5] = '自律的判断力がやや控えめです。先輩のサポートを受けながら、徐々に自分で考えて行動する力を養いましょう。';

    // Severity-based prefix
    if (weak1.val < 3.0) {
        analysis.push('「' + TRAIT_NAMES_FULL[weak1.idx] + '（' + weak1.val.toFixed(1) + '）」が最も低く、重点的な強化が必要です。' + weakDesc[weak1.idx]);
    } else if (weak1.val < 4.0) {
        analysis.push('「' + TRAIT_NAMES_FULL[weak1.idx] + '（' + weak1.val.toFixed(1) + '）」が相対的に低い指標です。' + weakDesc[weak1.idx]);
    } else {
        analysis.push('6指標すべてが高水準ですが、その中で「' + TRAIT_NAMES_FULL[weak1.idx] + '（' + weak1.val.toFixed(1) + '）」が相対的に低めです。' + weakDesc[weak1.idx]);
    }

    // Second weakest if notably different from strongest
    if (weak2.val < strengths[0].val - 0.5) {
        analysis.push('また、「' + TRAIT_NAMES_FULL[weak2.idx] + '（' + weak2.val.toFixed(1) + '）」も今後の成長ポイントです。');
    }

    return analysis;
}

function goNextPart2Page() {

    const allQuestions = getPart2Questions();
    const startIdx = appState.part2Page * appState.part2PageSize;
    const endIdx = Math.min(startIdx + appState.part2PageSize, allQuestions.length);

    for (let i = startIdx; i < endIdx; i++) {

        const selected = document.querySelector('input[name="' + q.id + '"]:checked');

    if (unanswered.length > 0) {
        alert('すべての質問に回答してください。\n未回答: 問' + unanswered.join(', 問'));
        // Highlight unanswered questions
        for (let i = startIdx; i < endIdx; i++) {
            const q = allQuestions[i];
            const selected = document.querySelector('input[name="' + q.id + '"]:checked');
            const card = document.querySelector('[data-qid="' + q.id + '"]');
            if (card) {
                card.style.border = selected ? '' : '2px solid #e74c3c';
                card.style.borderRadius = selected ? '' : '8px';
            }
        }
        return;
    }

    savePart2Data();
    const maxPage = Math.ceil(allQuestions.length / appState.part2PageSize);

    if (appState.part2Page < maxPage - 1) {
        appState.part2Page++;
        renderPart2Page();
        window.scrollTo(0, 0);
    } else {
        showSection('resultsSection');
        appState.currentSection = 'results';
        updateProgress(100);
        showResults();
    }
}

    }

    const missing = [];
    for (const fieldId of requiredFields) {
        const elem = document.getElementById(fieldId);
        if (!elem || !elem.value.trim()) {
            missing.push(fieldId);
            if (elem) elem.style.border = '2px solid #e74c3c';
        } else {
            if (elem) elem.style.border = '';
        }
    }
    if (missing.length > 0) {
        alert('すべての必須項目を入力してください。');
        return false;
    }
    return true;
}

function savePart1Data() {
    const fields = appState.currentMode === 'domestic' ? getDomesticFields() : getOverseasFields();
    fields.forEach(field => {
        if (field.type === 'checkbox') {
            const checked = Array.from(document.querySelectorAll('input[name="' + field.id + '"]:checked')).map(c => c.value);
            appState.testData[field.id] = checked;
        } else {
            const elem = document.getElementById(field.id);
            if (elem) appState.testData[field.id] = elem.value;
        }
    });
}

function savePart2Data() {
    const allQuestions = getPart2Questions();
    const startIdx = appState.part2Page * appState.part2PageSize;
    const endIdx = Math.min(startIdx + appState.part2PageSize, allQuestions.length);

    for (let i = startIdx; i < endIdx; i++) {
        const q = allQuestions[i];
        const selected = document.querySelector('input[name="' + q.id + '"]:checked');
        if (selected) {
            appState.testData[q.id] = selected.value;
        }
    }
}

async function generatePdfBase64() {
    // Create container positioned at document origin (top-left)
    // MUST be position:absolute at top:0 so html2canvas captures from (0,0)
    const container = document.createElement('div');
    container.id = 'pdfRenderContainer';
    container.style.cssText = 'position:absolute;left:0;top:0;width:800px;background:#fff;padding:20px;margin:0;z-index:99999;';
    container.innerHTML = buildPdfHTML();

    var oldScroll = window.scrollY;
    document.body.appendChild(container);

    // Wait for DOM rendering
    await new Promise(function(r) { setTimeout(r, 800); });

    var containerHeight = container.scrollHeight;
    console.log('PDF container height:', containerHeight);

    try {
        var opt = {
            margin: [10, 10, 10, 10],
            filename: 'YB_Result.pdf',
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: {
                scale: 2,
                useCORS: true,
                logging: true,
                width: 800,
                height: containerHeight,
                windowWidth: 800,
                windowHeight: containerHeight,
                x: 0,
                y: 0,
                scrollX: 0,
                scrollY: 0
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        var dataUri = await html2pdf().set(opt).from(container).outputPdf('datauristring');
        var base64 = dataUri.split(',')[1];

        if (!base64 || base64.length < 500) {
            console.error('PDF appears empty, base64 length:', base64 ? base64.length : 0);
            throw new Error('PDF生成が空です。再試行してください。');
        }

        return base64;
    } catch(e) {
        console.error('generatePdfBase64 error:', e);
        throw e;
    } finally {
        if (container.parentNode) container.parentNode.removeChild(container);
        window.scrollTo(0, oldScroll);
    }
}

// Helper: save file locally (backup download)
function localSavePdf(base64, filename) {
    try {
        const raw = atob(base64);
        const arr = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
        const blob = new Blob([arr], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } catch (e) {
        console.error('Local save error:', e);
    }
}

// ==================== EMAIL SENDING (rirekisho pattern) ====================
async function sendResultsEmail() {
    const btn = document.getElementById('sendEmailBtn');
    const emailInput = document.getElementById('emailInput');
    const toEmail = emailInput ? emailInput.value.trim() : '';

    // Validate email
    if (!toEmail || !toEmail.includes('@')) {
        showEmailStatus('❌ 有効なメールアドレスを入力してください。', 'red');
        if (emailInput) emailInput.style.border = '2px solid #e74c3c';
        return;
    }
    if (emailInput) emailInput.style.border = '';

    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL') {
        showEmailStatus('⚠️ APPS_SCRIPT_URL を設定してください。', '#e67e22');
        return;
    }

    // Disable button while sending
    if (btn) { btn.disabled = true; btn.textContent = '📧 PDF作成中...'; }
    showEmailStatus('📄 PDFを生成しています...', '#667eea');

    const name = document.getElementById('name')?.value || '---';
    const date = new Date().toISOString().slice(0, 10);
    const pdfFilename = 'YB_Result_' + (name.replace(/\s+/g, '_')) + '_' + date + '.pdf';

    try {
        // Step 1: Generate PDF as base64
        const pdfBase64 = await generatePdfBase64();
        if (!pdfBase64) throw new Error('PDF生成に失敗しました');

        showEmailStatus('📧 メールを送信しています...', '#667eea');
        if (btn) btn.textContent = '📧 送信中...';

        // Step 2: Send via Apps Script (rirekisho pattern: redirect:follow + no-cors fallback)
        let emailSent = false;
        const payload = JSON.stringify({
            type: 'yb_test_result',
            emails: [toEmail],
            subject: '【ユアブライト検査結果】' + name + ' (' + appState.testId + ') - ' + date,
            html_body: buildEmailHTML(),
            pdf_base64: pdfBase64,
            pdf_filename: pdfFilename,
            candidate_name: name,
            test_id: appState.testId,
            test_date: date
        });

        try {
            const resp = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                redirect: 'follow',
                body: payload
            });
            let result;
            try { result = await resp.json(); } catch (e) { result = { success: resp.ok }; }
            emailSent = result.success;
        } catch (fetchErr) {
            console.warn('Fetch with redirect failed, trying no-cors fallback:', fetchErr);
            // no-cors fallback (like rirekisho)
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: payload
                });
                emailSent = true; // Assume success with no-cors (can't read response)
            } catch (e2) {
                console.error('no-cors fallback also failed:', e2);
            }
        }

        // Step 3: Always save locally as backup (like rirekisho)
        localSavePdf(pdfBase64, pdfFilename);

        if (emailSent) {
            showEmailStatus('✅ メール送信完了！PDFも保存しました。（送信先: ' + toEmail + '）', 'green');
            if (btn) { btn.disabled = false; btn.textContent = '✅ 送信完了'; }
        } else {
            showEmailStatus('⚠️ メール送信は不明ですが、PDFをダウンロードしました。', '#e67e22');
            if (btn) { btn.disabled = false; btn.textContent = '📧 結果を送信（再試行）'; }
        }

    } catch (error) {
        console.error('Email/PDF Error:', error);
        showEmailStatus('❌ エラー: ' + error.message + ' - PDFダウンロードを試みます...', 'red');
        // Try to at least download PDF locally
        try {
            const pdfBase64 = await generatePdfBase64();
            if (pdfBase64) localSavePdf(pdfBase64, pdfFilename);
        } catch (e) {}
        if (btn) { btn.disabled = false; btn.textContent = '📧 結果を送信（再試行）'; }
    }
}
